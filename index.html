<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Cheat Sheet — Oryx</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --oryx-blue:#022A3A;
    --oryx-blue-tint:#0C4A63;
    --white:#FFFFFF;
    --silver:#A9A9A9;
    --black:#000000;
    --panel:#F6F8F9;
    --line:rgba(2,42,58,0.14);
    --line-soft:rgba(2,42,58,0.08);
    --font-display:'Archivo',sans-serif;
    --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--white);
    color:var(--black);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--oryx-blue);}

  /* ---------- Header ---------- */
  header{
    position:relative;
    padding:40px 48px 28px;
    overflow:hidden;
    border-bottom:1px solid var(--line);
  }
  .sweep{
    position:absolute;
    top:-40px;
    right:-40px;
    width:420px;
    height:220px;
    pointer-events:none;
  }
  .header-inner{
    position:relative;
    z-index:1;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
  }
  .brand-mark{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .eyebrow{
    font-family:var(--font-display);
    font-weight:600;
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--silver);
  }
  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:34px;
    letter-spacing:0.01em;
    color:var(--oryx-blue);
    margin:0;
  }
  .tagline{
    font-size:13px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    font-family:var(--font-display);
    font-weight:500;
    color:var(--silver);
    padding-top:10px;
    border-top:1px solid var(--line);
    margin-top:4px;
    width:fit-content;
  }
  .add-btn{
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    background:var(--oryx-blue);
    color:var(--white);
    border:none;
    padding:14px 22px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:background 0.15s ease;
  }
  .add-btn:hover{background:var(--oryx-blue-tint);}
  .sync-status{
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-family:var(--font-display);
    font-weight:500;
    color:var(--silver);
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:2px;
  }
  .sync-status::before{
    content:'';
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--silver);
  }
  .sync-status.live::before{background:#2f7a4d;}
  .sync-status.error::before{background:#8a2b2b;}

  /* ---------- Controls ---------- */
  .controls{
    padding:24px 48px;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
    border-bottom:1px solid var(--line);
  }
  .search-wrap{
    flex:1;
    min-width:220px;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    padding:12px 14px 12px 38px;
    border:1px solid var(--line);
    background:var(--panel);
    font-family:var(--font-body);
    font-size:14px;
    color:var(--black);
  }
  .search-wrap input:focus{outline:none;border-color:var(--oryx-blue);}
  .search-icon{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    width:16px;
    height:16px;
    color:var(--silver);
  }
  .tabs{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .tab{
    font-family:var(--font-display);
    font-weight:600;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:10px 14px;
    border:1px solid var(--line);
    background:var(--white);
    color:var(--oryx-blue);
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .tab:hover{border-color:var(--oryx-blue);}
  .tab.active{background:var(--oryx-blue);color:var(--white);border-color:var(--oryx-blue);}

  /* ---------- Grid ---------- */
  main{padding:32px 48px 64px;}
  .count-row{
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--silver);
    font-family:var(--font-display);
    font-weight:500;
    margin-bottom:18px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
  }
  .card{
    position:relative;
    background:var(--white);
    border:1px solid var(--line);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:border-color 0.15s ease;
  }
  .card:hover{border-color:var(--oryx-blue);}
  .card::before, .card::after,
  .card .corner-br::before, .card .corner-br::after{
    content:'';
    position:absolute;
    width:14px;
    height:14px;
    border:1px solid transparent;
    transition:border-color 0.15s ease;
  }
  .card::before{top:-1px;left:-1px;border-top-color:var(--line);border-left-color:var(--line);}
  .card::after{top:-1px;right:-1px;border-top-color:var(--line);border-right-color:var(--line);}
  .card:hover::before{border-top-color:var(--oryx-blue);border-left-color:var(--oryx-blue);}
  .card:hover::after{border-top-color:var(--oryx-blue);border-right-color:var(--oryx-blue);}
  .card-tag{
    font-family:var(--font-display);
    font-weight:600;
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--oryx-blue);
  }
  .card-title{
    font-family:var(--font-display);
    font-weight:600;
    font-size:16px;
    color:var(--black);
    margin:0;
    line-height:1.3;
  }
  .card-body{
    font-size:13.5px;
    line-height:1.6;
    color:#333;
    white-space:pre-wrap;
    margin:0;
  }
  .card-link{
    font-size:12.5px;
    word-break:break-all;
  }
  .card-footer{
    margin-top:auto;
    padding-top:10px;
    border-top:1px solid var(--line-soft);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    color:var(--silver);
  }
  .card-del{
    background:none;
    border:none;
    color:var(--silver);
    cursor:pointer;
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    font-family:var(--font-display);
    padding:0;
  }
  .card-del:hover{color:#8a2b2b;}

  .empty{
    padding:60px 20px;
    text-align:center;
    color:var(--silver);
    font-size:14px;
    grid-column:1/-1;
    border:1px dashed var(--line);
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(2,42,58,0.35);
    display:none;
    align-items:flex-start;
    justify-content:flex-end;
    z-index:50;
  }
  .overlay.open{display:flex;}
  .panel{
    background:var(--white);
    width:420px;
    max-width:100%;
    height:100%;
    overflow-y:auto;
    padding:32px;
    border-left:1px solid var(--line);
  }
  .panel h2{
    font-family:var(--font-display);
    font-size:20px;
    color:var(--oryx-blue);
    margin:0 0 4px;
  }
  .panel .sub{
    font-size:12px;
    color:var(--silver);
    margin:0 0 24px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-family:var(--font-display);
  }
  label{
    display:block;
    font-family:var(--font-display);
    font-weight:600;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--oryx-blue);
    margin:18px 0 6px;
  }
  input[type=text], select, textarea{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    background:var(--panel);
    font-family:var(--font-body);
    font-size:14px;
    color:var(--black);
  }
  input[type=text]:focus, select:focus, textarea:focus{outline:none;border-color:var(--oryx-blue);}
  textarea{resize:vertical;min-height:100px;}
  .panel-actions{
    display:flex;
    gap:10px;
    margin-top:28px;
  }
  .btn-primary, .btn-ghost{
    font-family:var(--font-display);
    font-weight:600;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:12px 18px;
    cursor:pointer;
    border:1px solid var(--oryx-blue);
  }
  .btn-primary{background:var(--oryx-blue);color:var(--white);flex:1;}
  .btn-primary:hover{background:var(--oryx-blue-tint);}
  .btn-ghost{background:var(--white);color:var(--oryx-blue);}
  .close-x{
    position:absolute;
    top:28px;
    right:28px;
    background:none;
    border:none;
    cursor:pointer;
    color:var(--silver);
    font-size:20px;
    line-height:1;
  }
  .field-error{font-size:12px;color:#8a2b2b;margin-top:6px;display:none;}

  @media(max-width:640px){
    header, .controls, main{padding-left:20px;padding-right:20px;}
    .panel{width:100%;}
  }
</style>
</head>
<body>

<header>
  <svg class="sweep" viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
    <path d="M420 10 C300 10 210 70 150 220" stroke="var(--oryx-blue)" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M420 30 C310 32 230 90 185 220" stroke="var(--oryx-blue)" stroke-width="3" fill="none" opacity="0.25"/>
  </svg>
  <div class="header-inner">
    <div class="brand-mark">
      <span class="eyebrow">Oryx · Internal Resource</span>
      <h1>Claude Cheat Sheet</h1>
      <span class="tagline">Skills &amp; Commands &amp; Tips</span>
      <span class="sync-status" id="syncStatus">Connecting…</span>
    </div>
    <button class="add-btn" id="openAdd">+ Add Entry</button>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search entries…">
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-cat="all">All</button>
    <button class="tab" data-cat="commands">Commands</button>
    <button class="tab" data-cat="prompting">Prompting</button>
    <button class="tab" data-cat="skills">Skills &amp; Workflows</button>
    <button class="tab" data-cat="resources">Resources</button>
    <button class="tab" data-cat="discoveries">Discoveries</button>
  </div>
</div>

<main>
  <div class="count-row" id="countRow">Loading entries…</div>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay">
  <div class="panel">
    <button class="close-x" id="closePanel">&times;</button>
    <h2>Add an entry</h2>
    <p class="sub">Visible to the whole team</p>

    <label for="fCategory">Category</label>
    <select id="fCategory">
      <option value="commands">Commands / CLI</option>
      <option value="prompting">Prompting technique</option>
      <option value="skills">Skill / workflow</option>
      <option value="resources">Resource / link</option>
      <option value="discoveries">Discovery / note</option>
    </select>

    <label for="fTitle">Title</label>
    <input type="text" id="fTitle" placeholder="e.g. /compact — trim context mid-session">
    <div class="field-error" id="errTitle">Give it a title.</div>

    <label for="fBody">Details</label>
    <textarea id="fBody" placeholder="What it does, when to use it, gotchas…"></textarea>
    <div class="field-error" id="errBody">Add a bit of detail.</div>

    <label for="fLink">Link (optional)</label>
    <input type="text" id="fLink" placeholder="https://…">

    <label for="fAuthor">Your name</label>
    <input type="text" id="fAuthor" placeholder="e.g. Sara">

    <div class="panel-actions">
      <button class="btn-ghost" id="cancelAdd">Cancel</button>
      <button class="btn-primary" id="saveAdd">Save entry</button>
    </div>
  </div>
</div>

<script>
// Paste your Firebase config here — from Firebase console > Project settings > Your apps
const firebaseConfig = {
  apiKey: "AIzaSyAyux2Zu-651KTK7w8BowxbV9Hjb6t_2UE",
  authDomain: "oryx-cheat-sheet.firebaseapp.com",
  projectId: "oryx-cheat-sheet",
  storageBucket: "oryx-cheat-sheet.firebasestorage.app",
  messagingSenderId: "449130107014",
  appId: "1:449130107014:web:6539982ce0bdc1fb910107"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const entriesCollection = db.collection('entries');

const AUTHOR_KEY = 'oryx-cheatsheet-author-name';
const syncStatusEl = document.getElementById('syncStatus');
const CATEGORY_LABELS = {
  commands: 'Commands / CLI',
  prompting: 'Prompting technique',
  skills: 'Skill / workflow',
  resources: 'Resource / link',
  discoveries: 'Discovery / note'
};

let entries = [];
let activeCat = 'all';
let searchTerm = '';

const grid = document.getElementById('grid');
const countRow = document.getElementById('countRow');
const tabsWrap = document.getElementById('tabs');
const overlay = document.getElementById('overlay');

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function isValidLink(url){
  try{
    const u = new URL(url);
    return u.protocol === 'http:' || u.protocol === 'https:';
  }catch(e){
    return false;
  }
}

function listenForEntries(){
  entriesCollection.orderBy('createdAt', 'desc').onSnapshot(
    (snapshot) => {
      entries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      syncStatusEl.textContent = 'Live · synced with team';
      syncStatusEl.className = 'sync-status live';
      render();
    },
    (err) => {
      console.error('Firestore sync error:', err);
      syncStatusEl.textContent = 'Connection error — check setup';
      syncStatusEl.className = 'sync-status error';
    }
  );
}

function render(){
  const term = searchTerm.trim().toLowerCase();
  const filtered = entries.filter(e => {
    const catMatch = activeCat === 'all' || e.category === activeCat;
    if(!catMatch) return false;
    if(!term) return true;
    return (e.title + ' ' + e.body + ' ' + (e.author||'')).toLowerCase().includes(term);
  }).sort((a,b) => b.createdAt - a.createdAt);

  countRow.textContent = filtered.length + (filtered.length === 1 ? ' entry' : ' entries');

  if(filtered.length === 0){
    grid.innerHTML = '<div class="empty">No entries here yet. Be the first to add one.</div>';
    return;
  }

  grid.innerHTML = filtered.map(e => {
    const linkHtml = e.link ? `<div class="card-link"><a href="${escapeHtml(e.link)}" target="_blank" rel="noopener">${escapeHtml(e.link)}</a></div>` : '';
    const dateStr = new Date(e.createdAt).toLocaleDateString(undefined, {month:'short', day:'numeric'});
    return `
      <div class="card">
        <span class="card-tag">${escapeHtml(CATEGORY_LABELS[e.category] || e.category)}</span>
        <p class="card-title">${escapeHtml(e.title)}</p>
        <p class="card-body">${escapeHtml(e.body)}</p>
        ${linkHtml}
        <div class="card-footer">
          <span>${escapeHtml(e.author || 'Anonymous')} · ${dateStr}</span>
          <button class="card-del" data-id="${e.id}">Remove</button>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.card-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      btn.disabled = true;
      btn.textContent = 'Removing…';
      try{
        await entriesCollection.doc(id).delete();
      }catch(e){
        alert('Could not remove that entry. Check your connection and try again.');
        btn.disabled = false;
        btn.textContent = 'Remove';
      }
    });
  });
}

tabsWrap.addEventListener('click', (ev) => {
  const btn = ev.target.closest('.tab');
  if(!btn) return;
  tabsWrap.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  render();
});

document.getElementById('searchInput').addEventListener('input', (ev) => {
  searchTerm = ev.target.value;
  render();
});

const openAdd = document.getElementById('openAdd');
const closePanel = document.getElementById('closePanel');
const cancelAdd = document.getElementById('cancelAdd');
const saveAdd = document.getElementById('saveAdd');

function openOverlay(){
  overlay.classList.add('open');
  let savedAuthor = '';
  try{ savedAuthor = localStorage.getItem(AUTHOR_KEY) || ''; }catch(e){}
  document.getElementById('fAuthor').value = savedAuthor;
}
function closeOverlay(){
  overlay.classList.remove('open');
  document.getElementById('fTitle').value = '';
  document.getElementById('fBody').value = '';
  document.getElementById('fLink').value = '';
  document.getElementById('errTitle').style.display = 'none';
  document.getElementById('errBody').style.display = 'none';
}

openAdd.addEventListener('click', openOverlay);
closePanel.addEventListener('click', closeOverlay);
cancelAdd.addEventListener('click', closeOverlay);
overlay.addEventListener('click', (ev) => { if(ev.target === overlay) closeOverlay(); });

saveAdd.addEventListener('click', async () => {
  const title = document.getElementById('fTitle').value.trim();
  const body = document.getElementById('fBody').value.trim();
  const link = document.getElementById('fLink').value.trim();
  const author = document.getElementById('fAuthor').value.trim();
  const category = document.getElementById('fCategory').value;

  let valid = true;
  if(!title){ document.getElementById('errTitle').style.display = 'block'; valid = false; }
  else { document.getElementById('errTitle').style.display = 'none'; }
  if(!body){ document.getElementById('errBody').style.display = 'block'; valid = false; }
  else { document.getElementById('errBody').style.display = 'none'; }
  if(link && !isValidLink(link)){
    alert('That link doesn\'t look valid. Include https:// or leave it blank.');
    valid = false;
  }
  if(!valid) return;

  saveAdd.disabled = true;
  saveAdd.textContent = 'Saving…';

  try{
    await entriesCollection.add({
      category, title, body, link,
      author: author || 'Anonymous',
      createdAt: Date.now()
    });
    if(author){
      try{ localStorage.setItem(AUTHOR_KEY, author); }catch(e){}
    }
    closeOverlay();
  }catch(e){
    alert('Could not save that entry. Check your connection and try again.');
  }finally{
    saveAdd.disabled = false;
    saveAdd.textContent = 'Save entry';
  }
});

listenForEntries();
</script>

</body>
</html>
